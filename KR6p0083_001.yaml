body:
  text: 拙庵戒度注八萬四千之妙相得非本性彌陀初句舉彼果德十六觀經相好光明各有八萬四千以本攝末故但云相為表因中塵勞清淨是故相好以八萬四千為數衆生亦具如是法門但由未顯翻作塵勞諸佛已悟則成勝用維摩經云八萬四千諸煩惱門而諸衆生為之疲勞諸佛即以此法而作佛事然此相好皆是圓實無作道品之所修發稱之為妙次句指佛即性果德高深了知生佛不離剎那同一覺源圓照諸法現前一念即是諸佛法界之身以諸如來無別所證全證衆生本有妙性金剛錍云故知果地依正融通並依衆生理本故也大經云衆生即是佛何以故若離衆生不得三菩提故起信論云所言覺義者謂心體離念離念相者等虗空界無所不遍法界一相即是如來常住法身依此法身説名本覺是知果佛圓明之體即我凡夫本具性德全是衆生色心依正更無別體既全我心當處顯發但觀自心即是佛身是故經云心想佛時是心即是三十二相八十種好是心作佛是心是佛又般若經云佛是我心是我心見佛是我心作佛如來藏經云我以佛眼觀一切衆生貪嗔癡諸煩惱中有如來智如來眼如來身結跏趺坐儼然不動常無染污德相具足如我無異維摩經云諸佛解脫當於衆生心行中求斯即唯依心現不離真如終日觀心終日觀佛全心是佛全佛是心良由法界全體作我一念亦復全體作彌陀身既俱法界心佛無差彼彼互融不可思議豈唯心佛諸法亦然是則世出世間二死五住地獄色心依正因果無非皆是法界圓融三德祕藏但由彌陀悟此理故了性順修圓證三身感四淨土一切衆生迷此理故背性逆修恆居三道長埋四趣雖全在迷與佛所證未始暫乖但為衆生不知三障理全是佛即以此理起惑造業輪回生死長劫用理長劫不知不由不知而失此理現前苦果即是法身三惑昏暗全體照明結業纏縛皆解脫相故荊溪云衆生無始唯有煩惱業苦而已即此全是理性三因又云且論無始苦輪無際與業煩惱不並不別乃至云是故三道及以三德並無前後性德三因無時不具蓋言三障全是諸佛究竟果用我輩今日既知此理必須專想彌陀依正熏乎心性顯真佛體雖托彼境須知依正同居一心心具而生豈離心性者一毫法見從外來則非大乘唯心境觀又復雖以彌陀一佛為境已具諸佛故經云見無量壽佛者即見十方無量諸佛良以諸佛同證三法祕密之藏一佛祕藏不少諸佛祕藏不多舉一即諸全諸即一經云一身一智慧力無畏亦然十萬億剎之遐方的是唯心淨土初句指彼安養經云從是西方過十萬億佛剎有世界名曰極樂此即法藏比丘因中所取同居淨土也次句了土唯心者良由現前一心本具三德名常寂光湛然不動名之為常性本離染名之為寂法界洞朗名之為光即此全是唯心之體故祖師云身土居于一心故知心體即常寂光寂光諸土無二無別遮那之身與土相稱法興報應一體無差又云阿鼻依正全處極聖之自心毗盧身土不逾下凡之一念但由心體本無自性隨緣變造起三土用是故彌陀高棲安養雖過十萬敻在他域悉我自心寂光理土華嚴云三界無別法唯是一心作是故十方諸佛一切衆生過現未來虗空剎土唯心本具全心發生楞嚴云妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎又云十方虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶汝等一人發真歸源此十方空皆悉消殞良由此心圓具三德周遍法界同常寂光未有一法出我心外未有一法非我心體是故全心是土全土是心心既無外寧有淨土懸處他方能如是解則見彼土純是自心非他方也終日取土故全性起修則非自然終日唯心故全修即性則非因緣修性俱泯唯心體顯又復應知八萬相好乃彌陀勝應之身既達本性則三身具足四德無虧即始覺之智也十萬億剎乃西方同居之土若了唯心即是寂光無非法界即本覺之理也始覺滿足本覺究顯始本一合無復分張是知離身無土離土無身一法二義何者身亦三德土亦三德既俱三德俱是法界法界一相身土無差又復國土屬依佛身屬正依正既居一心一心豈分能所是故彌陀身土不離我心一念圓成全體即佛唯心淨土不待遠求本性彌陀豈從外覔如是解者方契圓修若但觀彼應佛依正豈得謂之唯心本性也淨穢雖隔豈越自心躡上唯心淨土也雖曰淨土唯我自心奈何此心全體穢染彼佛國土淨妙莊嚴淨穢宛然唯心安在當知此是識心計度若了唯心豈存淨穢良以淨穢諸土悉是寂光全體起用物機妄執淨穢斯分究論法體豈其然乎如淨名經螺髻梵王呵身子云勿作是意謂此佛土以為不淨所以者何我見釋迦牟尼佛土清淨譬如自在天宮仁者心有高下不依佛慧故見此土為不淨爾又云隨其心淨則佛土淨亦可例云隨其心穢則佛土穢迷法性為無明名之為穢悟無明即法性名之為淨此乃一理之內而分淨穢譬如清水濁水雖殊濕性無別所以安養之淨湛忍之穢雖敻隔十萬之遙同常寂光悉我心性既知淨穢全是心性心性本空淨穢無主毗盧遮那遍一切處一切諸法無非佛性豈容淨穢於其間哉生佛乃殊寧乖己性躡上本性彌陀也彌陀已悟圓證三身衆生在迷翻成三障迷悟且隔己性有乖斯是執情何關至理真如界內絶生佛之假名平等性中無自他之形相衆生三障全體是理諸佛三身無非性具世間相常衆生即佛雖見思昏倒而有理在焉若知此心與佛無殊則十方諸佛同趣我心故金錍云佛果具自他之因性我心具諸佛之果德果上以佛眼佛智觀之則唯佛無生因中若實慧實眼冥符亦全生是佛不二門云但識一念遍見己他生佛他生他佛尚與心同況己心生佛寧乖一念良以唯心本具即心變造全體起用因果理同能知此者始可與言心佛衆生無差別矣心體虗曠不礙往來性本包容何妨取舍心之與性或以真妄分之如荊溪云隨緣不變名性不變隨緣名心今文心性並屬乎真一體二名耳如楞嚴云常住真心性淨明體又云圓妙明心寶明妙性心性之為體也虗而通寂而照體性常住德量無邊三諦圓融一心具足故輔行云能觀心性名上定上定者名第一義名為佛性名毗盧遮那即此遮那性具三佛性遮那遍故佛性亦遍故知三佛唯一剎那三佛遍故剎那即遍此則三諦妙性妙心也虗曠言其性遍是示體量也廣大悉備圓遍諸法無有方所金剛錍云非內外遍虗空同諸佛等法界則知此心遍一切處也包容言其性具是示體德也良由此性具一切法即一切法包有萬德靡所不容故荊溪云此遍性具諸佛之身一身一切身如諸佛之感土一土一切土身土相即身説土説大小一多亦復如是則知此心具一切法也楞嚴云如意點容十方三世一切世間出世間法唯聖與凡無不包容盡其涯際良以即心是法即法是心芥子常納須彌微塵本含法界皆悉當處全是心性故也譬如函蓋盛貯他物之謂乎故天台云多所含容而無積聚斯則如來藏理亡泯諸法雖亡而存諸法宛爾常空常假雙空雙照二邊叵得中道不存是大涅槃名祕密藏心性若爾詎有穢之可捨淨之可往乎良以往來取捨淨穢身土皆是法界即是妙心妙性心性湛然無一異相彌陀依正全是自心豈以心性復取心性譬如有人欲避虗空遠向他國祇益疲勞空云何避若其然者則終日往來不移跬步終日取捨不步思惟又復應知往來取捨是緣生法緣生無性了不可得故中論云因緣生法即空假中又云諸法不自生亦不從他生不共不無因是故説無生既達三諦復離四句則往來之相取捨之心無所寄矣十疑論云智者熾然求生淨土達生體不可得是真無生此謂心淨則佛土淨愚者為生所縛聞生即作生解聞無生即作無生解不知生即無生無生即生能如是解念念進修上品金臺一生可獲是以舉念即登於寶界還歸地産之家鄉彈指仰對於慈容實會天真之父子是以乃承上之詞舉念彈指喻其疾速還歸者楞嚴云猶如有人因事遠遊未得歸還明了其家所歸道路地即實相地家即法性家天真猶天然也父子者生如來家為法王子亦可遠取大通佛所彌陀為十六王子時覆講法華經為父子義究論其本居實際地住佛性家則與彌陀久成父子一迷鄉土父子頓乖今既了土唯心悟佛即性猶在不失舉足下足豈越故鄉念茲在茲常親慈父幾生負德抂受沉淪今日投誠必蒙拯濟幾生言其無始負德語其起妄本具三德迷背不覺遂受生死辜違父子之性德也楞伽云一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此相不真故有輪轉又云由諸衆生違此本明雖終日行而不自覺枉入諸趣必蒙拯濟者彌陀悟本運同體悲衆生迷強受諸幻苦悲苦相對感應道交故楞嚴云十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時我今遭苦期心欲脫必與彌陀悲體相冥決蒙拯拔如人遇難求彼強援必得脫免三心圓發一志西馳盡來際以依承歷塵劫而稱讚三心即上品上生中志誠心深心回向發願心也志誠即法身深心即般若回向即解脫三心實在一念中具全三是一即一而三故云圓發一志等者經云應當專心繫念一處想於西方又云當起想念正坐西向心多馳散三昧難成專想不移往生易得盡來際者如華嚴中盛談來際即實報土法性常住三際無餘從今獲遇亘徹未來決志親承終無退轉歷劫稱讚者良以彌陀積劫勤求道場證得三身究顯萬德圓備縱使辨才天女億劫稱揚莫宣少分應須諦了能讚所讚皆是法界名遍虗空一切衆生聞此偈句十方諸佛受我詠讚於一言音演無量義讚佛一德萬德溥收四辨敷陳不涉唇吻八音競唱不落言詮豁悟圓通返聞自性如是讚嘆與不讚嘆更無異轍矣澤録録餘生與世浮沉烏知有所謂安養徑捷法門曩嘗沿幹慈水邂逅懸胥徐鑑者精進此道因得勸發自此幡然有驚謝去塵緣寓于滄洲之等觀憶念修習朝夕不敢墮寒暑不知變者蓋有年矣凡有禮念必先嚴誦大智律師之讚語續得拙庵度律師注解斯文文義明白深恐湮沒敬募同志用鏤諸板誓與見聞咸希極證吁唯心本性固人人之所具敢問諸人十二時中所謂心所謂性是何面目嘉定辛未年夏月望唯心居士樓澤法名正因謹跋豫在唐之昔雖見修淨業者盛誦大智律師之讚語未知拙庵宗師之有注今祐公將來文字之中偶得此文冀即雕于板以廣其傳適有僧覺住淨光平常留心西方卒見此文感歎而舍淨財命工開板誓與人人明于唯心本性即登寶剎矣日本建保三年乙亥九月初三日入宋傳法比丘俊芿謹識于洛東寶菩提之西軒也
