body:
  text: 無量壽佛讚注并引大智律師所製讚詞文約義豐旨趣宏遠唯心之道盡於此矣嘗慨吾宗二三豪傑注釋流行隨言取解暗乎指歸有抑乎作者之意深可惜焉偶諸同道以愚曾習山家之教薄究斯宗再命箋注愚雖不敏有異前聞遂採經論格言直申厥旨庶幾少悟西邁之資糧非特沽出藍之譽也覽者取長其理無取長其情焉庚午中秋日寓三江蘭若注
